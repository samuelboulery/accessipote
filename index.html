<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/accessibility-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy stricte — sans 'unsafe-inline' ni 'unsafe-eval'
      Police Chelsea Market auto-hébergée dans /public/fonts/ (pas de dépendance Google Fonts)

      default-src 'self'         : par défaut, uniquement les assets locaux
      script-src 'self'          : scripts Vite uniquement — React 19 ne génère pas de code inline
      style-src 'self'           : CSS Tailwind compilé (app.css) + @font-face local dans index.css
      font-src 'self'            : polices locales uniquement (/fonts/*.woff2)
      img-src 'self' data: blob: : assets locaux + data URIs + blob: (jsPDF)
      connect-src 'self'         : pas de requêtes vers des API externes
      base-uri 'self'            : empêche les injections de base URL
      form-action 'self'         : soumettre les formulaires uniquement en local
      object-src 'none'          : bloque les plugins legacy (Flash, Java)
      upgrade-insecure-requests  : force HTTPS en production
      Note: frame-ancestors doit être défini via HTTP headers, pas via meta
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      font-src 'self';
      img-src 'self' data: blob:;
      connect-src 'self';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests;
    ">
    <title>Accessipote</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
